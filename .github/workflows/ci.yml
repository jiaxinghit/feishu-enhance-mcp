name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install flake8 black isort
    
    - name: Lint with flake8
      run: |
        flake8 feishu_enhance_mcp --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 feishu_enhance_mcp --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check feishu_enhance_mcp || true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only feishu_enhance_mcp || true
    
    - name: Test with pytest
      run: |
        pytest || true
    
    - name: Test package build
      run: |
        pip install build
        python -m build
